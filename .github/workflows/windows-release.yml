name: Windows Release

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Generate Drift and localization files
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Package Windows release
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tool\package_release.ps1

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: MindNoron-windows-x64
          path: dist/*.zip
